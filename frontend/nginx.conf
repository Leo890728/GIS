server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: serve built assets, fall back to index.html otherwise.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the backend route prefixes to the web service so the SPA can
    # call the API same-origin (no CORS, backend port need not be public).
    location ~ ^/(api|data|datasets|health|ranges|regions|tiles)(/|$) {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events for /data/history/<id>/track/stream: don't buffer
        # and allow a long-lived connection.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
