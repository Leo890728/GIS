# Full stack:
#   frontend – nginx serving the built SPA, reverse-proxying the API to web
#   web      – serves the API; capture disabled (HISTORY_BACKGROUND_POLL=0)
#   capture  – the only process that polls upstream and writes captures
#
# web + capture mount the same ./backend/data volume (cache.sqlite +
# history.sqlite are written by both; WAL + busy_timeout make that safe).
# bounds.sqlite / data.sqlite reference data must already exist under
# ./backend/data.
#
# A single full-network OSRM (osrm) serves both smooth-track building and VRP
# planning; the web service reaches it over the compose network.

services:
  osrm:
    image: ghcr.io/project-osrm/osrm-backend
    # Matches the existing files in tools/osrm/. Override with OSRM_DATA if you
    # rebuild to a different prefix, and keep OSRM_ALGO in sync with how that
    # prefix was built (build.sh: mld → partition/customize, ch → contract).
    # CH serves /table an order of magnitude faster — prefer it for VRP.
    command: osrm-routed --algorithm ${OSRM_ALGO:-mld} --max-table-size 1500 /data/${OSRM_DATA:-taiwan-260617.osrm}
    ports:
      - "5001:5000"            # host:container (osrm-routed listens on 5000)
    volumes:
      - ./tools/osrm:/data:ro
    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      args:
        # Empty => SPA calls the API same-origin; nginx proxies it to web.
        VITE_API_BASE_URL: ""
    ports:
      - "8080:80"
    depends_on:
      - web
    restart: unless-stopped


  web:
    build: .
    # gthread workers: --timeout is a worker-heartbeat (hang) guard, not a
    # per-request limit, so long road-smoothing streams survive while other
    # requests are still served by the worker's other threads.
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 --worker-class gthread --threads ${GUNICORN_THREADS:-4} --timeout ${GUNICORN_TIMEOUT:-120} "backend.app:create_app()"
    ports:
      - "5000:5000"
    environment:
      # Capture runs in the `capture` service, not here.
      HISTORY_BACKGROUND_POLL: "0"
      # Smooth tracks and VRP both use the single osrm service.
      HISTORY_OSRM_URL: "http://osrm:5000"
      VRP_OSRM_URL: "http://osrm:5000"
      # VRP OSRM client tuning; defaults live in backend/services/vrp — set the
      # matching keys in .env to override (documented in .env.example).
      VRP_OSRM_TIMEOUT_SECONDS: ${VRP_OSRM_TIMEOUT_SECONDS:-60}
      VRP_TABLE_SPLIT_THRESHOLD: ${VRP_TABLE_SPLIT_THRESHOLD:-400}
      VRP_TABLE_BLOCK_MAX_COORDS: ${VRP_TABLE_BLOCK_MAX_COORDS:-600}
      VRP_TABLE_MAX_PARALLEL_REQUESTS: ${VRP_TABLE_MAX_PARALLEL_REQUESTS:-8}
      VRP_SNAP_MAX_PARALLEL_REQUESTS: ${VRP_SNAP_MAX_PARALLEL_REQUESTS:-16}
      SPATIALITE_EXTENSION_PATH: "/usr/lib/x86_64-linux-gnu/mod_spatialite.so"
    volumes:
      - ./backend/data:/app/backend/data
    depends_on:
      - osrm
    restart: unless-stopped

  capture:
    build: .
    command: python -m backend.worker
    environment:
      HISTORY_BACKGROUND_POLL: "1"
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped
